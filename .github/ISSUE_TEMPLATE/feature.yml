name: Feature / Refactor / Chore
description: Propose work with full discovery card. Required for anything that's not a bug.
title: "[feat] "
labels: ["triage", "discovery-needed"]
body:
  - type: markdown
    attributes:
      value: |
        ## Discovery card
        For work to enter the backlog as `ready`, it must pass 4 filters. Without all 4, this issue stays in `triage` with the `discovery-needed` label.

        See [`docs/vision/jobs-to-be-done.md`](../docs/vision/jobs-to-be-done.md) and the [working method memory](../.claude/memory/project_working_method.md).

  - type: textarea
    id: trigger
    attributes:
      label: 1. Trigger personal documentado
      description: When/where did this need appear? Specific event, date, or pain point. Without a real trigger, this is engineering theater.
      placeholder: |
        On 2026-05-14, while reviewing my portfolio in the weekly cadence, I noticed that...
    validations:
      required: true

  - type: textarea
    id: jtbd
    attributes:
      label: 2. Job to be Done
      description: |
        Format: *"When X, I want Y, so that Z"*. Must map to one of the 6 canonical JTBDs OR justify why this is a new JTBD (which then requires editing `docs/vision/jobs-to-be-done.md`).
      placeholder: |
        When X, I want Y, so that Z.
        Maps to JTBD #N (or: new JTBD proposed because...).
    validations:
      required: true

  - type: input
    id: metric
    attributes:
      label: 3. Métrica de uso
      description: How will we know this works AND gets used? Proxy if needed.
      placeholder: "Adrian opens this section ≥ N times/week; tracked via X."
    validations:
      required: true

  - type: textarea
    id: dod
    attributes:
      label: 4. Definition of Done
      description: Concrete checklist of what "done" looks like. Include tests, doc updates, screenshots if relevant.
      placeholder: |
        - [ ] Migration added for X
        - [ ] Use case implemented
        - [ ] Tests covering Success/Failure
        - [ ] View updated, screenshot regenerated in docs/screenshots/
        - [ ] No ADR-001 violations in new copy
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 — beta-blocker"
        - "P1 — cleanup or refactor before next features"
        - "P2 — quality / polish"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - feat
        - refactor
        - chore
        - docs
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes / blockers / references
      description: Optional. Cross-references to ADRs, audit findings, dependencies on other issues.
