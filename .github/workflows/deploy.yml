name: Deploy

on:
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      action:
        description: 'Kamal command (default `deploy`; pick `setup` for first-time bootstrap on a new host)'
        type: choice
        options:
          - deploy
          - setup
          - redeploy
        default: deploy

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  packages: write
  contents: read

env:
  RUBY_VERSION: "3.3.6"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip tests on workflow_dispatch with action=setup (first-time host bootstrap
    # shouldn't be blocked by tests; tests already passed on the commit being deployed).
    if: ${{ inputs.action != 'setup' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stockerly
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: stockerly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_USERNAME: stockerly
      DATABASE_PASSWORD: test_password

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:create db:schema:load

      - name: Run tests
        run: bundle exec rspec

      - name: Run Brakeman
        run: bin/brakeman --no-pager

      - name: Run bundler-audit
        run: bundle exec bundler-audit check --update

  deploy:
    name: Deploy (${{ inputs.action || 'deploy' }})
    needs: test
    # Allow setup to run even if test was skipped (test.if was false on action=setup).
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    env:
      ACTION: ${{ inputs.action || 'deploy' }}
      DOCKER_BUILDKIT: 1
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_ACTOR: ${{ github.actor }}
      HOST_IP: ${{ secrets.HOST_IP }}
      SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
      HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - uses: docker/setup-buildx-action@v3

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Boot accessories (idempotent — only for deploy/redeploy; setup boots them itself)
        if: env.ACTION != 'setup'
        run: bin/kamal accessory boot all || true

      - name: Run kamal ${{ env.ACTION }}
        run: bin/kamal "$ACTION"

      - name: Notify Honeybadger of deploy
        if: ${{ success() && env.ACTION == 'deploy' }}
        run: |
          curl --silent --show-error \
            --data "deploy[environment]=production&deploy[revision]=${{ github.sha }}&deploy[repository]=${{ github.repository }}&deploy[local_username]=${{ github.actor }}&api_key=$HONEYBADGER_API_KEY" \
            https://api.honeybadger.io/v1/deploys
