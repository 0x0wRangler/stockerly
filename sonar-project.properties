sonar.projectKey=stockerly
sonar.projectName=stockerly
sonar.sourceEncoding=UTF-8

sonar.sources=app,lib
sonar.tests=spec
sonar.exclusions=db/**,vendor/**,node_modules/**,public/**,tmp/**,storage/**

# Copy-paste detection exclusions. legal_controller declares three
# structurally-similar legal-page descriptors (privacy/terms/risk_disclosure)
# — declarative content, not copy-pasted logic, so CPD flags the repeated
# toc hashes with no real duplication to DRY. Overall duplication is ~0.4%.
sonar.cpd.exclusions=app/controllers/legal_controller.rb

# Coverage: run `bundle exec rspec` with SimpleCov's JSON formatter before scanning.
sonar.ruby.coverage.reportPaths=coverage/coverage.json
